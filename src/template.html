<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Todo List</title>

</head>

<body>

    <div class="app">

        <!-- Sidebar -->

        <aside class="sidebar">

            <h2>Projects</h2>

            <ul id="project-list"></ul>

            <button id="add-project-btn">
                + New Project
            </button>

        </aside>

        <!-- Main -->

        <main class="main">

            <header>

                <h1 id="project-title">
                    Default
                </h1>

                <button id="add-todo-btn">
                    + Add Todo
                </button>

            </header>

            <div id="todo-container"></div>

        </main>

    </div>

    <!-- Modal -->

    <dialog id="todo-dialog">

        <form id="todo-form">

            <h2>New Todo</h2>

            <input
                id="title"
                type="text"
                placeholder="Title"
                required>

            <textarea
                id="description"
                placeholder="Description">
            </textarea>

            <input
                id="dueDate"
                type="date">

            <select id="priority">

                <option>Low</option>

                <option>Medium</option>

                <option>High</option>

            </select>

            <div class="modal-buttons">

                <button type="submit">
                    Save
                </button>

                <button
                    type="button"
                    id="cancel-btn">

                    Cancel

                </button>

            </div>

        </form>

    </dialog>

</body>

</html>
